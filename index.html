<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Southern California Roleplay</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #1b2028;
      --bg-2: #161b22;
      --nav: rgba(20, 24, 31, 0.88);
      --nav-border: rgba(255, 255, 255, 0.08);
      --text: #f3f6fb;
      --muted: #b7c0cf;
      --hover: rgba(255, 255, 255, 0.08);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", sans-serif;
      background:
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: var(--nav);
      border-bottom: 1px solid var(--nav-border);
      box-shadow: var(--shadow);
    }

    .nav-wrap {
      max-width: 1320px;
      margin: 0 auto;
      height: 82px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      text-decoration: none;
      color: var(--text);
    }

    .brand-logo {
      width: 46px;
      height: 46px;
      object-fit: contain;
      display: block;
      flex: 0 0 auto;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.08));
    }

    .brand-text {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-name {
      font-family: "Sora", sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .brand-tagline {
      font-family: "Sora", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 11px 16px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      transition: background 0.18s ease, transform 0.18s ease, color 0.18s ease;
    }

    .nav-link:hover {
      background: var(--hover);
      transform: translateY(-1px);
    }

    .nav-link svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      opacity: 0.95;
    }

    .page {
      padding-top: 82px;
    }

    .hero {
      min-height: calc(100vh - 82px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .hero-inner {
      max-width: 1320px;
      width: 100%;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 20px;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .section {
      max-width: 1320px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .section-card {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      min-height: 320px;
      background: rgba(255,255,255,0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 600;
    }

    @media (max-width: 980px) {
      .nav-wrap {
        height: auto;
        min-height: 82px;
        padding-top: 14px;
        padding-bottom: 14px;
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        width: 100%;
        justify-content: flex-start;
      }

      .page {
        padding-top: 122px;
      }

      .hero {
        min-height: calc(100vh - 122px);
      }
    }

    @media (max-width: 640px) {
      .brand-text {
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
      }

      .brand-name,
      .brand-tagline {
        font-size: 0.95rem;
      }

      .nav-link {
        padding: 10px 13px;
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="nav-wrap">
      <a href="#home" class="brand">
        <img src="logo.png" alt="SCRP Logo" class="brand-logo">
        <div class="brand-text">
          <div class="brand-name">SCRP</div>
          <div class="brand-tagline">As Spec As It Gets.</div>
        </div>
      </a>

      <nav class="nav-links">
        <a href="#home" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 10.5L12 3L21 10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 9.5V20H18V9.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Home</span>
        </a>

        <a href="#about" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9.2 9A3 3 0 1 1 15 10C15 12 12 12.2 12 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="18" r="1" fill="currentColor"/>
            <path d="M12 22C17.5 22 22 17.5 22 12S17.5 2 12 2 2 6.5 2 12 6.5 22 12 22Z" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span>About Us</span>
        </a>

        <a href="#departments" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 21H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 21V8L12 4L19 8V21" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M9 21V14H15V21" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          <span>Departments</span>
        </a>

        <a href="#discord" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 17C9.2 18 10.5 18.5 12 18.5C13.5 18.5 14.8 18 16 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="9" cy="11.5" r="1.1" fill="currentColor"/>
            <circle cx="15" cy="11.5" r="1.1" fill="currentColor"/>
            <path d="M7 6.8C8.8 5.8 10.4 5.4 12 5.4C13.6 5.4 15.2 5.8 17 6.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M7.5 17.5L6 19C4.2 17.5 3 14.9 3 12C3 9.1 4.2 6.5 6 5L7.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16.5 17.5L18 19C19.8 17.5 21 14.9 21 12C21 9.1 19.8 6.5 18 5L16.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Discord</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section id="home" class="hero">
      <div class="hero-inner">Landing page base ready.</div>
    </section>

    <section id="about" class="section">
      <div class="section-card">About Us section placeholder</div>
    </section>

    <section id="departments" class="section">
      <div class="section-card">Departments section placeholder</div>
    </section>

    <section id="discord" class="section">
      <div class="section-card">Discord section placeholder</div>
    </section>
  </main>

  <script>
    const navLinks = document.querySelectorAll('.nav-link');

    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        navLinks.forEach(item => item.classList.remove('active'));
        link.classList.add('active');
      });
    });
  </script>
</body>
</html>
