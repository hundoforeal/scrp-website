<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southern California Roleplay</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
linear-gradient(rgba(15,18,22,.6),rgba(15,18,22,.7)),
url("https://images.unsplash.com/photo-1494976388531-d1058494cdd8?q=80&w=2000") center/cover no-repeat;
color:white;
overflow:hidden;
}

.nav{
position:absolute;
top:40px;
display:flex;
gap:40px;
font-weight:600;
font-size:14px;
letter-spacing:.08em;
text-transform:uppercase;
}

.nav a{
color:rgba(255,255,255,.8);
text-decoration:none;
position:relative;
}

.nav a:hover{
color:white;
}

.nav a.active::after{
content:"";
position:absolute;
bottom:-8px;
left:0;
width:100%;
height:2px;
background:white;
opacity:.9;
}

.hero{
width:900px;
max-width:90%;
padding:60px;
border-radius:22px;
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(18px);
box-shadow:0 40px 80px rgba(0,0,0,.45);
position:relative;
}

h1{
font-size:70px;
font-weight:800;
line-height:.9;
letter-spacing:-.03em;
}

.subtitle{
margin-top:20px;
color:rgba(255,255,255,.7);
letter-spacing:.05em;
}

.cta{
margin-top:40px;
display:inline-block;
padding:18px 40px;
border-radius:14px;
background:linear-gradient(#4da7ff,#0a73ff);
font-weight:700;
text-decoration:none;
box-shadow:0 10px 30px rgba(0,120,255,.5);
transition:.15s;
}

.cta:hover{
transform:translateY(-2px);
box-shadow:0 16px 40px rgba(0,120,255,.6);
}

.roles{
position:absolute;
bottom:30px;
right:40px;
display:flex;
gap:28px;
font-size:14px;
color:rgba(255,255,255,.8);
}

.role{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.icon{
width:24px;
height:24px;
}

.icon.police{color:#4da7ff;}
.icon.fire{color:#ff4a55;}
.icon.civ{color:#ddd;}

svg{
stroke:currentColor;
stroke-width:2;
fill:none;
}
</style>
</head>

<body>

<div class="nav">
<a class="active" href="#">Home</a>
<a href="#">Departments</a>
<a href="#">Apply</a>
<a href="#">Discord</a>
</div>

<div class="hero">

<h1>
SOUTHERN<br>
CALIFORNIA<br>
ROLEPLAY
</h1>

<div class="subtitle">
ULTRA-REALISTIC. IMMERSIVE. SPEC ROLEPLAY.
</div>

<a class="cta" href="#">APPLY NOW</a>

<div class="roles">

<div class="role">
<svg class="icon police" viewBox="0 0 24 24">
<path d="M12 2L19 5V10C19 15 16 18 12 20C8 18 5 15 5 10V5Z"/>
</svg>
Police
</div>

<div class="role">
<svg class="icon fire" viewBox="0 0 24 24">
<path d="M12 2C15 6 18 8 18 13A6 6 0 1 1 6 13C6 9 9 7 12 2Z"/>
</svg>
Fire
</div>

<div class="role">
<svg class="icon civ" viewBox="0 0 24 24">
<rect x="4" y="10" width="16" height="6" rx="2"/>
<circle cx="7" cy="17" r="2"/>
<circle cx="17" cy="17" r="2"/>
</svg>
Civilian
</div>

</div>

</div>

</body>
</html>
