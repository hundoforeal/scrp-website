<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southern California Roleplay</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(10,14,20,.5),rgba(10,14,20,.65)),
url("background.png") center/cover no-repeat;

color:white;
overflow:hidden;
}

/* NAV BAR */

.navbar{

position:absolute;
top:35px;
left:50%;
transform:translateX(-50%);

display:flex;
gap:35px;

padding:16px 40px;

border-radius:18px;

background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.25);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.navbar a{

text-decoration:none;
color:rgba(255,255,255,.9);

font-weight:600;
font-size:14px;
letter-spacing:.08em;

text-transform:uppercase;

}

/* HERO CARD */

.hero{

width:900px;
max-width:90%;

padding:60px;

border-radius:26px;

background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.25);

backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

box-shadow:0 40px 80px rgba(0,0,0,.45);

position:relative;

}

/* SERVER LOGO */

.server-logo{

position:absolute;

right:40px;
top:40px;

width:120px;

opacity:.95;

filter:drop-shadow(0 0 15px rgba(255,255,255,.25));

}

/* TITLE */

h1{

font-size:72px;
font-weight:800;

line-height:.9;
letter-spacing:-.03em;

text-transform:uppercase;

}

/* SUBTITLE */

.subtitle{

margin-top:20px;

font-size:18px;

letter-spacing:.04em;

color:rgba(255,255,255,.75);

}

/* APPLY BUTTON */

.cta{

display:inline-block;

margin-top:40px;

padding:18px 40px;

border-radius:14px;

background:linear-gradient(#4da7ff,#0a73ff);

text-decoration:none;
font-weight:700;

box-shadow:0 12px 30px rgba(0,120,255,.55);

}

/* DEPARTMENT STRIP */

.departments{

position:absolute;

bottom:30px;
right:40px;

display:flex;
gap:30px;

}

/* INDIVIDUAL DEPARTMENT */

.dept{

display:flex;
flex-direction:column;
align-items:center;
gap:6px;

font-size:12px;

letter-spacing:.08em;

text-transform:uppercase;

color:rgba(255,255,255,.9);

}

/* LOGOS */

.dept img{

width:36px;
height:36px;
object-fit:contain;

filter:drop-shadow(0 0 8px rgba(255,255,255,.3));

}

/* CIVILIAN ICON */

.civ{

width:36px;
height:36px;

stroke:#d5d9de;
stroke-width:2;
fill:none;

}

</style>

</head>

<body>

<div class="navbar">

<a href="#">Home</a>
<a href="#">Departments</a>
<a href="#">Apply</a>
<a href="#">Discord</a>

</div>


<div class="hero">

<img src="logo.png" class="server-logo">

<h1>

Southern<br>
California<br>
Roleplay

</h1>

<div class="subtitle">

ULTRA-REALISTIC. IMMERSIVE. SPEC ROLEPLAY.

</div>

<a class="cta" href="#">APPLY NOW</a>


<div class="departments">

<div class="dept">
<img src="lapd-logo.png">
LAPD
</div>

<div class="dept">
<img src="lasd-logo.png">
LASD
</div>

<div class="dept">
<img src="chp-logo.png">
CHP
</div>

<div class="dept">
<img src="lafd-logo.png">
LAFD
</div>

<div class="dept">

<svg class="civ" viewBox="0 0 24 24">

<rect x="4" y="10" width="16" height="6" rx="2"/>
<circle cx="7" cy="17" r="2"/>
<circle cx="17" cy="17" r="2"/>

</svg>

CIVILIAN

</div>

</div>

</div>

</body>
</html>
